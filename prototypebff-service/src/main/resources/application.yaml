server:
  port: 8080
spring:
  application:
    name: prototypebff-service
  cloud:
    function:
      #definition: supplier;consumer
      definition: ordersupplier;orderconsumer
    stream:
      #function:
        #definition: supplier;consumer
        #definition: ordersupplier;orderconsumer
        #definition: sink;flux
      bindings:
        ordersupplier-out-0:
          destination: order-created
        orderconsumer-in-0:
          destination: order-updated
      kafka:
        binder:
          brokers: ${KAFKA_HOST:localhost}:9092
          auto-create-topics: true
  sql:
    init:
      mode: always
      continue-on-error: true
      data-locations: classpath:schema.sql

  r2dbc:
    #url: r2dbc:postgresql://localhost:3432/re2dbc_db
    url: r2dbc:postgresql://${DB_HOST:localhost:3432}/re2dbc_db
    #url: r2dbc:h2:mem:///fluxr2dbc
    username: postgres
    password: postgrespw
    
  jpa:
   defer-datasource-initialization: true
  #  show-sql: true
   # hibernate:
   #   ddl-auto: update
   # database-platform: org.hibernate.dialect.H2Dialect
  #datasource:
   #     url: r2dbc:h2:mem:fluxr2dbc
   #     username: admin
   #     password: adminpw
   #     driver-class-name: org.h2.Driver
  h2:
   console:
     enabled: true
     #path: /h2-console
     #port: 8089
springdoc:
  swagger-ui:
    path: /swagger-ui # swagger custom path
    enabled: true  # Disabling the swagger-ui production enviroments always false
    use-root-path: true
  api-docs:
    groups:
      enabled: true

tracing:
  url: http://localhost:4318/v1/traces

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
logging:
  pattern:
    level: '%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]'      
